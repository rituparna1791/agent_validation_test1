name: kpi-validation-agent

command: ["streamlit", "run", "app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]

env:
  # DATABRICKS_HOST is injected automatically by Databricks Apps — no need to set it.
  - name: SQL_WAREHOUSE_ID
    value: ""          # ← paste your SQL Warehouse ID here, e.g. abc123def456

  - name: LLM_MODEL_NAME
    value: "databricks-meta-llama-3-3-70b-instruct"

  - name: DEFAULT_CATALOG
    value: "main"

  - name: DEFAULT_SCHEMA
    value: "default"
